name: VYROBIT APK ATARIHELP

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Vyrob debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Stahnout projekt
        uses: actions/checkout@v4

      - name: 1b - Vycistit stare duplicitni ikony
        run: |
          echo "Mazani starych problematickych ikon, ktere GitHub upload neumi sam odstranit..."
          rm -f app/src/main/res/drawable/ic_launcher.png
          rm -f app/src/main/res/drawable/ic_launcher.webp
          rm -f app/src/main/res/drawable/ic_launcher.jpeg
          rm -f app/src/main/res/drawable/ic_launcher.jpg
          echo "Obsah drawable po vycisteni:"
          ls -la app/src/main/res/drawable || true

      - name: 2 - Pripravit Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 3 - Pripravit Android SDK
        uses: android-actions/setup-android@v3

      - name: 4 - Doinstalovat Android balicky
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: 5 - Pripravit Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 6 - Vyrobit APK
        run: gradle assembleDebug --stacktrace

      - name: 7 - Ulozit hotove APK ke stazeni
        uses: actions/upload-artifact@v4
        with:
          name: HOTOVE_APK_ATARIHELP_STAHNI_ME
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
